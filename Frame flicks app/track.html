<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Project Progress — Frame Flicks</title>
<link rel="icon" href="assets/frameflicks-icon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="theme-color" content="#0a0a0c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://esm.sh">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/tracker.css">
</head>
<body>

<div class="track-shell">
  <div class="track-card">
    <img src="assets/frameflicks-logo.png" alt="Frame Flicks" class="track-logo">

    <div id="trackLoading" class="track-state">Loading your project…</div>

    <div id="trackNotFound" class="track-state" style="display:none;">
      <div class="track-state-icon">🔍</div>
      <p>We couldn't find a project for this link. Double-check the link your editor sent you, or ask them to resend it.</p>
    </div>

    <div id="trackContent" style="display:none;">
      <div class="track-project-name" id="trackProject"></div>
      <div class="track-client-name" id="trackClient"></div>

      <div id="trackProgressBlock">
        <div class="track-progress">
          <div class="track-progress-line"></div>
          <div class="track-progress-fill" id="trackFill"></div>
          <div class="track-steps" id="trackSteps"></div>
        </div>
        <div class="track-expected" id="trackExpected" style="display:none;"></div>
      </div>

      <div id="trackDeliveredBlock" class="track-delivered" style="display:none;">
        <div class="track-delivered-badge">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="track-delivered-title">Delivered</div>
        <div class="track-delivered-date" id="trackDeliveredDate"></div>
      </div>

      <div class="track-note" id="trackNote" style="display:none;"></div>

      <div class="track-contact">
        <a class="track-contact-btn" id="trackWhatsapp" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.98.578 3.826 1.573 5.377L2 22l4.756-1.548A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          WhatsApp
        </a>
        <a class="track-contact-btn" id="trackEmail">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="m4 6 8 7 8-7"/></svg>
          Email
        </a>
      </div>

      <div class="track-updated" id="trackUpdated"></div>
      <p class="track-hint">Bookmark this page to check back anytime — it updates automatically as your editor moves things along.</p>
      <div class="track-footer">Powered by Frame Flicks</div>
    </div>
  </div>
  <div id="trackToast" class="track-toast"></div>
</div>

<script type="module" src="js/tracker.js"></script>
</body>
</html>
