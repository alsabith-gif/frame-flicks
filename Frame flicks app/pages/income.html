<div class="kpi-grid">
  <div class="kpi-card c-green">
    <div class="kpi-label">Total Earned</div>
    <div class="kpi-value" id="incTotalEarned">₹0</div>
  </div>
  <div class="kpi-card c-amber">
    <div class="kpi-label">Pending</div>
    <div class="kpi-value" id="incPending">₹0</div>
  </div>
  <div class="kpi-card c-blue">
    <div class="kpi-label">Active Projects</div>
    <div class="kpi-value" id="incActive">0</div>
  </div>
  <div class="kpi-card c-red">
    <div class="kpi-label">Overdue Payments</div>
    <div class="kpi-value" id="incOverdue">0</div>
  </div>
</div>

<div class="toolbar">
  <select class="select-filter" id="incMonthFilter">
    <option value="">All months</option>
  </select>
  <select class="select-filter" id="incStatusFilter">
    <option value="">All statuses</option>
    <option value="Paid">Paid</option>
    <option value="Pending">Pending</option>
    <option value="Partial">Partial</option>
  </select>
  <select class="select-filter" id="incPriorityFilter">
    <option value="">All priorities</option>
  </select>
  <select class="select-filter" id="incContentTypeFilter">
    <option value="">All content types</option>
  </select>
  <select class="select-filter" id="incSort">
    <option value="newest">Sort: Newest</option>
    <option value="priority">Sort: Priority</option>
    <option value="due">Sort: Due Soonest</option>
  </select>
</div>

<div class="table-wrap">
  <table class="data-table data-table-compact">
    <thead>
      <tr>
        <th>Client</th><th>Project</th><th>Stage</th><th>Date</th><th>Due</th><th>Amount</th><th>Status</th><th>Revisions</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="incomeTbody"></tbody>
  </table>
</div>

<div class="mobile-cards" id="incomeMobileCards"></div>

<div class="empty-state" id="incomeEmpty" style="display:none;">
  <div class="icon">💸</div>
  <p>No income entries yet — add your first project.</p>
</div>

<div class="grid-2 mt-16">
  <div class="card span-2">
    <div class="card-title">Monthly Income</div>
    <div id="monthlyIncomeChart"></div>
  </div>
  <div class="card">
    <div class="card-title">Income by Client</div>
    <div id="incomeByClient"></div>
  </div>
</div>
