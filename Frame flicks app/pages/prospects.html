<div class="kpi-grid" id="prospectKpis">
  <div class="kpi-card">
    <div class="kpi-label">Total</div>
    <div class="kpi-value" id="kpiTotal">0</div>
  </div>
  <div class="kpi-card c-purple">
    <div class="kpi-label">Replied</div>
    <div class="kpi-value" id="kpiReplied">0</div>
  </div>
  <div class="kpi-card c-blue">
    <div class="kpi-label">Video Sent</div>
    <div class="kpi-value" id="kpiVideoSent">0</div>
  </div>
  <div class="kpi-card c-pink">
    <div class="kpi-label">Meetings</div>
    <div class="kpi-value" id="kpiMeetings">0</div>
  </div>
  <div class="kpi-card c-amber">
    <div class="kpi-label">Interested</div>
    <div class="kpi-value" id="kpiInterested">0</div>
  </div>
  <div class="kpi-card c-green">
    <div class="kpi-label">Closed</div>
    <div class="kpi-value" id="kpiClosed">0</div>
  </div>
</div>

<div class="chip-bar" id="nicheChipBar"></div>

<div class="toolbar" id="groupsBar" style="margin-bottom:8px;">
  <button class="btn btn-sm" id="groupsBtn">⊞ Groups</button>
  <div class="chip-bar" id="groupChipBar" style="margin-bottom:0; flex:1;"></div>
</div>

<div class="toolbar">
  <input type="text" class="search-input" id="searchInput" placeholder="Search name, niche, email, notes…">
  <select class="select-filter" id="statusFilter">
    <option value="">All statuses</option>
  </select>
  <select class="select-filter" id="platformFilter">
    <option value="">All platforms</option>
  </select>
  <select class="select-filter" id="priorityFilter">
    <option value="">All priorities</option>
  </select>
</div>

<div class="table-wrap">
  <table class="data-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Name / Handle</th>
        <th>Platform</th>
        <th>Status</th>
        <th>Follow-up</th>
        <th>Pipeline</th>
        <th>Next Action</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="prospectsTbody"></tbody>
  </table>
</div>

<div class="mobile-cards" id="prospectsMobileCards"></div>

<div class="empty-state" id="prospectsEmpty" style="display:none;">
  <div class="icon">📭</div>
  <p>No prospects match your filters yet.</p>
</div>

<div class="pager" id="prospectsPager">
  <span id="pagerInfo">0–0 of 0</span>
  <div class="pager-btns">
    <button class="btn btn-sm" id="pagerPrev">Prev</button>
    <button class="btn btn-sm" id="pagerNext">Next</button>
  </div>
</div>
