<div class="finder-layout">
  <aside class="finder-panel card">
    <div class="card-title">✨ Search Criteria</div>

    <div class="finder-section-label">Where to look</div>
    <div class="form-field">
      <label>Platform</label>
      <select id="finPlatform">
        <option value="Any">Any</option>
        <option value="YouTube">YouTube</option>
        <option value="Instagram">Instagram</option>
        <option value="TikTok">TikTok</option>
      </select>
    </div>
    <div class="form-field"><label>Niche / Content Type</label><input type="text" id="finNiche" placeholder="e.g. fitness, gaming, cooking"></div>
    <div class="form-field"><label>Language / Region (optional)</label><input type="text" id="finLanguage" placeholder="e.g. India, English"></div>

    <div class="finder-section-label">Audience &amp; content fit</div>
    <div class="grid-2">
      <div class="form-field"><label>Min Followers</label><input type="number" id="finMinFollowers" placeholder="1000"></div>
      <div class="form-field"><label>Max Followers</label><input type="number" id="finMaxFollowers" placeholder="100000"></div>
    </div>
    <div class="form-field">
      <label>Upload Frequency</label>
      <select id="finFrequency">
        <option value="Any">Any</option>
        <option value="Daily">Daily</option>
        <option value="Few times a week">Few times a week</option>
        <option value="Weekly">Weekly</option>
        <option value="Occasional">Occasional</option>
      </select>
    </div>
    <div class="form-field">
      <label>Content Quality</label>
      <select id="finQuality">
        <option value="Any">Any</option>
        <option value="Raw / unedited">Raw / unedited</option>
        <option value="Basic edits">Basic edits</option>
        <option value="Polished but improvable">Polished but improvable</option>
      </select>
    </div>
    <div class="form-field"><label>Extra Requirements (optional)</label><textarea id="finExtra" placeholder="Anything else to narrow the search…"></textarea></div>

    <div class="finder-section-label">Batch</div>
    <div class="grid-2">
      <div class="form-field">
        <label>Results Count</label>
        <select id="finCount">
          <option value="8">8</option>
          <option value="12" selected>12</option>
          <option value="20">20</option>
        </select>
      </div>
      <div class="form-field"><label>Group Name</label><input type="text" id="finGroupName" placeholder="Batch 1"></div>
    </div>

    <button class="btn btn-primary finder-find-btn" id="findCreatorsBtn">✨ Find Creators</button>
  </aside>

  <section class="finder-results">
    <div class="chip-bar" id="aiGroupChips"></div>

    <div id="finderLoading" class="empty-state" style="display:none;">
      <div class="icon">✨</div>
      <p id="finderLoadingText">AI is finding creators…</p>
    </div>

    <div id="finderError" class="empty-state" style="display:none;">
      <div class="icon">⚠️</div>
      <p id="finderErrorText"></p>
    </div>

    <div id="finderEmpty" class="empty-state">
      <div class="icon">🔍</div>
      <p>Set your criteria and click "Find Creators" to get AI-suggested leads.</p>
    </div>

    <div class="finder-results-head" id="finderResultsHead" style="display:none;">
      <span id="finderResultsCount"></span>
      <button class="btn btn-sm" id="addAllBtn">+ Add All to Prospects</button>
    </div>

    <div class="finder-cards" id="finderCards"></div>
  </section>
</div>
