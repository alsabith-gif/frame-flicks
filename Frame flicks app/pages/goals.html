<div class="grid-2">
  <div class="card">
    <div class="card-title">🎯 Set Your Targets</div>
    <div class="form-grid">
      <div class="form-field"><label>New DMs Goal</label><input type="number" id="goalDms"></div>
      <div class="form-field"><label>Follow-ups Goal</label><input type="number" id="goalFollowups"></div>
      <div class="form-field"><label>Sample Edits Goal</label><input type="number" id="goalSamples"></div>
      <div class="form-field"><label>Weekly Client Goal</label><input type="number" id="goalClients"></div>
      <div class="form-actions">
        <button class="btn btn-primary" id="saveGoalsBtn">Save Targets</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">✅ Today's Goals — <span id="todayDateLabel"></span></div>
    <div id="todayChecklist"></div>
  </div>
</div>

<div class="card mt-16">
  <div class="card-title">📅 Goal History</div>
  <div id="goalHistoryList"></div>
</div>
